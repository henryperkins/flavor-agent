name: Verify

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, lint, and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/composer/files
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      # check-doc-freshness.sh hard-exits 2 without ripgrep, and the check-docs
      # step only runs under --strict, so install it explicitly rather than
      # relying on whatever the runner image happens to ship.
      - name: Install ripgrep
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y ripgrep
          rg --version

      - name: Validate dependency manifests
        run: composer validate --strict --no-check-publish

      - name: Install Node.js dependencies
        run: npm ci --no-audit --no-fund

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # lint-plugin needs WP-CLI plus a resolvable WordPress root (or the Docker
      # compose stack), neither of which exists on a bare runner. Skip it here and
      # keep it a local/release gate. E2E runs in its own job so a harness flake
      # cannot mask the deterministic signal above.
      - name: Run verification suite
        run: node scripts/verify.js --strict --skip-e2e --skip=lint-plugin

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: verify-output
          path: output/verify/
          if-no-files-found: warn
          retention-days: 7

  e2e-playground:
    name: Playground smoke suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/composer/files
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Node.js dependencies
        run: npm ci --no-audit --no-fund

      # The Playground harness mounts this repo as the active plugin, so the
      # editor/admin bundles and the PSR-4 autoloader must exist on disk first.
      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Build editor and admin assets
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playground smoke suite
        run: npm run test:e2e:playground

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-playground
          path: |
            output/playwright/
            playwright-report/
          if-no-files-found: ignore

  e2e-wp70:
    name: WordPress 7.0 Site Editor suite
    runs-on: ubuntu-latest
    timeout-minutes: 45

    # First CI landing for a harness that has only ever run locally. Flip this
    # to false once it has gone green on master, so it becomes a real gate.
    continue-on-error: true

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/composer/files
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Node.js dependencies
        run: npm ci --no-audit --no-fund

      # The harness bind-mounts this repo as the active plugin, so the
      # editor/admin bundles and the PSR-4 autoloader must exist on disk first.
      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Build editor and admin assets
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Provision the WordPress 7.0 harness
        run: npm run wp:e2e:wp70:bootstrap

      - name: Run the WordPress 7.0 Site Editor suite
        run: npm run test:e2e:wp70

      - name: Tear down the WordPress 7.0 harness
        if: always()
        run: npm run wp:e2e:wp70:teardown

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-wp70
          path: |
            output/playwright-wp70/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
