name: Update Developer Docs AI Search

on:
  schedule:
    # Daily incremental ingest (every day except Monday) — no stale deletion.
    - cron: '17 5 * * 0,2-6'
    # Monday run — the weekly stale-deletion pass.
    - cron: '17 5 * * 1'
  workflow_dispatch:
    inputs:
      release:
        description: 'Active WordPress release slug, for example 7-0'
        required: false
        default: '7-0'
      dry_run:
        description: 'Discover/build the corpus without writing to Cloudflare'
        type: boolean
        required: false
        default: false
      limit:
        description: 'Optional URL limit for smoke runs'
        required: false
        default: ''
      delete_stale:
        description: 'Delete stale managed docs items (opt-in; only applied on a clean full run)'
        type: boolean
        required: false
        default: false
      full:
        description: 'Re-fetch every discovered URL, bypassing the sitemap-lastmod skip (use once after a DOC_LAYOUT_VERSION bump so stored items rebuild)'
        type: boolean
        required: false
        default: false
      configure_instance:
        description: 'Update AI Search instance config before ingesting (triggers Cloudflare resync)'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: update-docs-ai-search
  cancel-in-progress: false

jobs:
  update-docs-ai-search:
    name: Update wp-dev-docs corpus
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_AI_SEARCH_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_SEARCH_API_TOKEN }}
      CLOUDFLARE_AI_SEARCH_INSTANCE: ${{ vars.CLOUDFLARE_AI_SEARCH_INSTANCE || 'wp-dev-docs' }}
      CLOUDFLARE_AI_SEARCH_PUBLIC_URL: ${{ vars.CLOUDFLARE_AI_SEARCH_PUBLIC_URL || 'https://101d836c-480b-4b39-b14e-505a6aa58f47.search.ai.cloudflare.com/search' }}
      INPUT_RELEASE: ${{ github.event.inputs.release || '7-0' }}
      INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      INPUT_LIMIT: ${{ github.event.inputs.limit || '' }}
      INPUT_DELETE_STALE: ${{ github.event_name == 'schedule' && github.event.schedule == '17 5 * * 1' && 'true' || github.event.inputs.delete_stale || 'false' }}
      INPUT_FULL: ${{ github.event.inputs.full || 'false' }}
      INPUT_CONFIGURE_INSTANCE: ${{ github.event.inputs.configure_instance || 'false' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: .nvmrc

      - name: Restore previous manifest
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: output/docs-ai-search/manifest.json
          key: docs-ai-search-manifest-${{ github.run_id }}
          restore-keys: |
            docs-ai-search-manifest-

      - name: Update Cloudflare AI Search corpus
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "--release=${INPUT_RELEASE}"
            "--instance=${CLOUDFLARE_AI_SEARCH_INSTANCE}"
            "--public-url=${CLOUDFLARE_AI_SEARCH_PUBLIC_URL}"
            "--poll-seconds=600"
          )
          if [[ "${INPUT_DRY_RUN}" == "true" ]]; then
            args+=( "--dry-run" )
          fi
          if [[ -n "${INPUT_LIMIT}" ]]; then
            args+=( "--limit=${INPUT_LIMIT}" )
          fi
          if [[ "${INPUT_DELETE_STALE}" == "true" ]]; then
            args+=( "--delete-stale" )
          fi
          if [[ "${INPUT_FULL}" == "true" ]]; then
            args+=( "--full" )
          fi
          if [[ "${INPUT_CONFIGURE_INSTANCE}" == "true" ]]; then
            args+=( "--configure" )
          fi
          node scripts/update-docs-ai-search.js "${args[@]}"

      - name: Upload updater summary
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: docs-ai-search-summary
          path: output/docs-ai-search/
          if-no-files-found: ignore
