name: Update Developer Docs AI Search

on:
  schedule:
    - cron: '17 5 * * 1'
  workflow_dispatch:
    inputs:
      release:
        description: 'Active WordPress release slug, for example 7-0'
        required: false
        default: '7-0'
      dry_run:
        description: 'Discover/build the corpus without writing to Cloudflare'
        type: boolean
        required: false
        default: false
      limit:
        description: 'Optional URL limit for smoke runs'
        required: false
        default: ''
      delete_stale:
        description: 'Delete stale managed docs items (opt-in; only applied on a clean full run)'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  update-docs-ai-search:
    name: Update wp-dev corpus
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_AI_SEARCH_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_SEARCH_API_TOKEN }}
      CLOUDFLARE_AI_SEARCH_INSTANCE: ${{ vars.CLOUDFLARE_AI_SEARCH_INSTANCE || 'wp-dev' }}
      CLOUDFLARE_AI_SEARCH_PUBLIC_URL: ${{ vars.CLOUDFLARE_AI_SEARCH_PUBLIC_URL || 'https://ba566764-a507-4cd0-8cc8-cffbbde72ac3.search.ai.cloudflare.com/search' }}
      INPUT_RELEASE: ${{ github.event.inputs.release || '7-0' }}
      INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      INPUT_LIMIT: ${{ github.event.inputs.limit || '' }}
      INPUT_DELETE_STALE: ${{ github.event.inputs.delete_stale || 'false' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: .nvmrc

      - name: Update Cloudflare AI Search corpus
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "--release=${INPUT_RELEASE}"
            "--instance=${CLOUDFLARE_AI_SEARCH_INSTANCE}"
            "--public-url=${CLOUDFLARE_AI_SEARCH_PUBLIC_URL}"
            "--poll-seconds=600"
          )
          if [[ "${INPUT_DRY_RUN}" == "true" ]]; then
            args+=( "--dry-run" )
          fi
          if [[ -n "${INPUT_LIMIT}" ]]; then
            args+=( "--limit=${INPUT_LIMIT}" )
          fi
          if [[ "${INPUT_DELETE_STALE}" == "true" ]]; then
            args+=( "--delete-stale" )
          fi
          node scripts/update-docs-ai-search.js "${args[@]}"

      - name: Upload updater summary
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: docs-ai-search-summary
          path: output/docs-ai-search/
          if-no-files-found: ignore
