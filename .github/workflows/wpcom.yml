name: Build WordPress.com Plugin Artifact

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wpcom-artifact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-artifact:
    name: Build WordPress.com plugin artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Validate dependency manifests
        run: composer validate --strict --no-check-publish

      - name: Install Node.js dependencies
        run: npm ci --no-audit --no-fund

      - name: Build editor and admin assets
        run: npm run build

      - name: Prepare WordPress.com plugin artifact
        shell: bash
        env:
          WPCOM_ARTIFACT_DIR: ${{ runner.temp }}/wpcom-artifact
        run: |
          set -euo pipefail
          rm -rf -- "$WPCOM_ARTIFACT_DIR"
          bash scripts/prepare-release.sh "$WPCOM_ARTIFACT_DIR"

      - name: Validate WordPress.com plugin artifact
        shell: bash
        env:
          WPCOM_ARTIFACT_DIR: ${{ runner.temp }}/wpcom-artifact
        run: |
          set -euo pipefail

          required_files=(
            flavor-agent.php
            readme.txt
            vendor/autoload.php
            build/index.js
            build/index.asset.php
            build/admin.js
            build/admin.asset.php
            build/activity-log.js
            build/activity-log.asset.php
          )

          excluded_paths=(
            .git
            .github
            node_modules
            src
            tests
            scripts
            docs
            package.json
            package-lock.json
            phpunit.xml.dist
            phpcs.xml.dist
          )

          for path in "${required_files[@]}"; do
            test -f "$WPCOM_ARTIFACT_DIR/$path" || {
              echo "::error file=$path::Required artifact file is missing"
              exit 1
            }
          done

          for path in "${excluded_paths[@]}"; do
            test ! -e "$WPCOM_ARTIFACT_DIR/$path" || {
              echo "::error file=$path::Development path was included in the artifact"
              exit 1
            }
          done

          php -l "$WPCOM_ARTIFACT_DIR/flavor-agent.php"

          find "$WPCOM_ARTIFACT_DIR" -type l -print -quit |
            grep -q . && {
              echo "::error::Artifact contains symbolic links"
              exit 1
            } || true

          echo "Artifact contents:"
          du -sh "$WPCOM_ARTIFACT_DIR"
          find "$WPCOM_ARTIFACT_DIR" -maxdepth 2 -type f -printf '%P\n' | sort

      - name: Upload WordPress.com plugin artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wpcom
          path: ${{ runner.temp }}/wpcom-artifact
          if-no-files-found: error
          retention-days: 1
