name: Run provider diagnostics fix

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/fix-recommendation-provider-diagnostics'
    runs-on: ubuntu-latest

    steps:
      - name: Check out fix branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Prepare staged step runner
        shell: bash
        run: |
          rm -f .github/provider-diagnostics-failure.log
          cat > /tmp/run-staged-step <<'BASH'
          #!/usr/bin/env bash
          set -uo pipefail
          stage="$1"
          printf '%s\n' "$stage" > /tmp/provider-diagnostics-stage
          ruby -ryaml -e '
            name = ARGV.fetch(0)
            workflow = YAML.load_file(".github/workflows/agent-provider-diagnostics-fix.yml")
            steps = workflow.fetch("jobs").fetch("apply-and-verify").fetch("steps")
            step = steps.find { |candidate| candidate["name"] == name }
            abort("Staged step not found: #{name}") unless step && step["run"]
            print step.fetch("run")
          ' "$stage" > /tmp/provider-diagnostics-step.sh
          set +e
          bash /tmp/provider-diagnostics-step.sh 2>&1 | tee /tmp/provider-diagnostics-last.log
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"
          BASH
          chmod +x /tmp/run-staged-step

      - name: Install PHP dependencies
        run: /tmp/run-staged-step 'Install PHP dependencies'

      - name: Add provider diagnostics regression tests
        run: /tmp/run-staged-step 'Add provider diagnostics regression tests'

      - name: Verify regression tests fail before the fix
        run: /tmp/run-staged-step 'Verify regression tests fail before the fix'

      - name: Apply the production fix
        run: /tmp/run-staged-step 'Apply the production fix'

      - name: Auto-format changed PHP files
        shell: bash
        run: |
          printf '%s\n' 'Auto-format changed PHP files' > /tmp/provider-diagnostics-stage
          set +e
          vendor/bin/phpcbf \
            inc/Abilities/RecommendationAbilityExecution.php \
            inc/Activity/Repository.php \
            tests/phpunit/ProviderDiagnosticsActivityTest.php \
            2>&1 | tee /tmp/provider-diagnostics-last.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Verify provider diagnostics regression and related PHP suites
        run: /tmp/run-staged-step 'Verify provider diagnostics regression and related PHP suites'

      - name: Lint changed PHP files
        run: /tmp/run-staged-step 'Lint changed PHP files'

      - name: Verify patch integrity
        run: /tmp/run-staged-step 'Verify patch integrity'

      - name: Publish verification failure
        if: failure()
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          {
            printf 'Stage: %s\n\n' "$(cat /tmp/provider-diagnostics-stage 2>/dev/null || printf 'unknown')"
            tail -n 200 /tmp/provider-diagnostics-last.log 2>/dev/null || true
          } > .github/provider-diagnostics-failure.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/provider-diagnostics-failure.log
          git commit -m 'chore: capture provider diagnostics failure [skip ci]' -- .github/provider-diagnostics-failure.log
          git push origin HEAD:"${HEAD_BRANCH}"

      - name: Commit verified fix and remove temporary workflows
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          rm \
            .github/workflows/agent-provider-diagnostics-fix.yml \
            .github/workflows/agent-provider-diagnostics-pr.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- \
            inc/Abilities/RecommendationAbilityExecution.php \
            inc/Activity/Repository.php \
            tests/phpunit/ProviderDiagnosticsActivityTest.php \
            .github/provider-diagnostics-failure.log \
            .github/workflows/agent-provider-diagnostics-fix.yml \
            .github/workflows/agent-provider-diagnostics-pr.yml
          git commit -m 'Fix recommendation provider diagnostics'
          git push origin HEAD:"${HEAD_BRANCH}"
